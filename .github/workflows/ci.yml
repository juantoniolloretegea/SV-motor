name: ci

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          PYTHONPATH=src pytest -q --cov=sv_motor.algebra --cov-report=term-missing --cov-fail-under=90
      - name: Run laboratory
        run: |
          python laboratorio/etapa_1_nucleo_local/ejecutar_laboratorio_motor_etapa_1.py

      - name: Run end-to-end demo
        run: |
          python laboratorio/etapa_0_demostracion_local/ejecutar_demo_end_to_end_local.py
